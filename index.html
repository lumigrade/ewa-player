<!DOCTYPE html>
<!-- Our own .gsav player. Decode: WebCodecs VP9 (bit-exact luma) + fzstd + exact site math.
     Render: WebGL2 instanced EWA splatting + full SH deg-3 (CPU-evaluated per view).
     Run: node serve.js  ->  http://localhost:8123/work/viewer.html  -> drop a .gsav -->
<html><head><meta charset="utf-8"><title>4DSL Player</title><style>
html,body{margin:0;height:100%;background:#000;color:#ccc;font:13px monospace;overflow:hidden}
#cv{width:100vw;height:100vh;display:block}
#hud{position:fixed;left:10px;top:10px;background:#0008;padding:8px;border-radius:6px}
#bar{position:fixed;left:10px;right:10px;bottom:10px;display:flex;gap:8px;align-items:center;background:#0008;padding:8px;border-radius:6px}
#seek{flex:1}button{background:#222;color:#ccc;border:1px solid #555;border-radius:4px;padding:4px 10px}
#drop{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;font-size:22px;color:#888}
</style></head><body>
<canvas id="cv"></canvas>
<div id="hud">drop a .gsav anywhere</div>
<button id="loadcur" title="auto-load the latest file produced by the agent" style="position:fixed;left:50%;top:14px;transform:translateX(-50%);z-index:6;background:#222;color:#ccc;border:1px solid #666;border-radius:5px;font:bold 12px monospace;padding:7px 12px;cursor:pointer">⤓ Load Current</button>
<div id="bar" style="display:none"><button id="play">⏸</button><button id="mute" title="toggle soundtrack">🔊</button><input id="seek" type="range" min="0" max="0" value="0"><span id="fr"></span></div>
<div id="drop">DROP .GSAV HERE</div>
<select id="hdrSel" title="choose environment" style="position:fixed;top:10px;right:120px;z-index:7;background:#222;color:#ccc;border:1px solid #666;border-radius:6px;font:bold 12px monospace;padding:8px 8px;cursor:pointer;max-width:200px"></select>
<button id="hdrBtn" style="position:fixed;top:10px;right:10px;z-index:7;background:#222;color:#ccc;border:1px solid #666;border-radius:6px;font:bold 13px monospace;padding:8px 12px;cursor:pointer">🌄 HDRi: off</button>
<div id="fc" style="position:fixed;top:52px;right:10px;background:rgba(0,0,0,0.6);color:#ff0;font:bold 46px monospace;padding:6px 16px;border-radius:8px;display:none"></div>
<button id="gradeBtn" style="position:fixed;left:10px;bottom:62px;z-index:7;background:#222;color:#ccc;border:1px solid #666;border-radius:6px;font:bold 12px monospace;padding:8px 12px;cursor:pointer">🎨 Grade</button>
<div id="grade" style="position:fixed;left:10px;bottom:104px;z-index:8;background:#000b;color:#ccc;border:1px solid #777;border-radius:8px;font:11px monospace;padding:10px;display:none;width:210px">
  <div style="font-weight:bold;margin-bottom:6px">🎨 Color Grade (live → baked)</div>
  <label>Exposure <span id="gv_exp">0.00</span><input id="gs_exp" type="range" min="-2" max="2" step="0.01" value="0" style="width:100%"></label>
  <label>Temp <span id="gv_temp">0.00</span><input id="gs_temp" type="range" min="-0.3" max="0.3" step="0.005" value="0" style="width:100%"></label>
  <label>Tint <span id="gv_tint">0.00</span><input id="gs_tint" type="range" min="-0.3" max="0.3" step="0.005" value="0" style="width:100%"></label>
  <label>Contrast <span id="gv_con">1.00</span><input id="gs_con" type="range" min="0.5" max="1.8" step="0.01" value="1" style="width:100%"></label>
  <label>Saturation <span id="gv_sat">1.00</span><input id="gs_sat" type="range" min="0" max="2" step="0.01" value="1" style="width:100%"></label>
  <label>Black level <span id="gv_blk">0.00</span><input id="gs_blk" type="range" min="-0.2" max="0.3" step="0.005" value="0" style="width:100%"></label>
  <label>White level <span id="gv_wht">1.00</span><input id="gs_wht" type="range" min="0.6" max="1.4" step="0.005" value="1" style="width:100%"></label>
  <label>R <span id="gv_r">1.00</span><input id="gs_r" type="range" min="0.5" max="1.5" step="0.005" value="1" style="width:100%"></label>
  <label>G <span id="gv_g">1.00</span><input id="gs_g" type="range" min="0.5" max="1.5" step="0.005" value="1" style="width:100%"></label>
  <label>B <span id="gv_b">1.00</span><input id="gs_b" type="range" min="0.5" max="1.5" step="0.005" value="1" style="width:100%"></label>
  <div style="margin-top:8px;display:flex;gap:6px">
    <button id="g_reset" style="flex:1;background:#333;color:#ccc;border:1px solid #666;border-radius:4px;cursor:pointer;padding:5px">Reset</button>
    <button id="g_copy" style="flex:1;background:#2a6;color:#fff;border:1px solid #666;border-radius:4px;cursor:pointer;padding:5px">Bake EWA</button>
  </div>
</div>
<script type="module">
import { decompress as zstd } from 'https://unpkg.com/fzstd@0.1.1/esm/index.mjs';
let A=194,W=970,H=582;const SLOTS=14;  // A/W/H now read from gsav header (atlasSide@24,cols@26,rows@27) to support custom atlas sizes (>37636 splats)
const hud=document.getElementById('hud'),drop=document.getElementById('drop');
const bar=document.getElementById('bar'),seek=document.getElementById('seek'),frEl=document.getElementById('fr'),playBtn=document.getElementById('play');
let G=null; // {nG,NF,ranges,lumas[],los[],rest,decCache}
let cur=-1,playing=true;
const _qs=new URLSearchParams(location.search);
const OPSI=_qs.get('opsi')==='1';                                   // ?opsi=1 = match the the reference page exactly
const FOVDEG=parseFloat(_qs.get('fov')??(OPSI?45:50));              // the reference uses fov 45
const PLAYER='EWA player (:8123)'+(OPSI?' · the reference-matched':'');// shown next to the file name

function magic(buf,off){const u=new Uint8Array(buf,off,4);return String.fromCharCode(u[0],u[1],u[2],u[3]);}
async function load(buf){
  if(magic(buf,4)==='4DSL')return load4dsl(buf);
  return loadGsav(buf);
}
async function loadGsav(buf){
  const dv=new DataView(buf),u8=new Uint8Array(buf);
  const nG=dv.getUint32(8,true),NF=dv.getUint32(12,true);
  const rangesOff=dv.getUint32(32,true),frameIdxOff=dv.getUint32(40,true),mlOff=dv.getUint32(44,true),vidOff=dv.getUint32(48,true);
  let codec='';for(let i=52;i<68&&u8[i];i++)codec+=String.fromCharCode(u8[i]);
  const shBands=u8[80],shOff=dv.getUint32(81,true);
  A=dv.getUint16(24,true)||194;{const COLS=u8[26]||5,ROWS=u8[27]||3;W=A*COLS;H=A*ROWS;}  // dynamic atlas from header
  const f32=o=>dv.getFloat32(o,true);const vec=(o,n)=>Array.from({length:n},(_,i)=>f32(o+4*i));
  let o=rangesOff;const R={mMin:vec(o,3),mMax:vec(o+12,3)};o+=24;R.sMin=vec(o,3);R.sMax=vec(o+12,3);o+=24;
  R.qMin=vec(o,4);R.qMax=vec(o+16,4);o+=32;R.opMin=f32(o);R.opMax=f32(o+4);o+=8;R.hMin=vec(o,3);R.hMax=vec(o+12,3);
  hud.textContent=`nG=${nG} frames=${NF} codec=${codec} | decoding video...`;

  // ---- video: WebCodecs, store luma planes ----
  const lumas=new Array(NF);
  await new Promise((res,rej)=>{
    let got=0;
    const dec=new VideoDecoder({output:async f=>{
      const i=got++;
      const fmt=f.format||'';
      if(!(fmt.startsWith('I420')||fmt.startsWith('NV12')))rej('unsupported VideoFrame format '+fmt);
      const tmp=new Uint8Array(f.allocationSize());
      const layout=await f.copyTo(tmp);
      const {offset,stride}=layout[0];   // Y plane (same for I420/NV12)
      const Yp=new Uint8Array(W*H);
      for(let r=0;r<H;r++)Yp.set(tmp.subarray(offset+r*stride,offset+r*stride+W),r*W);
      lumas[i]=Yp;
      f.close();
      if(i===NF-1)res();
    },error:rej});
    dec.configure({codec:codec,codedWidth:W,codedHeight:H,hardwareAcceleration:'prefer-software'});
    for(let f=0;f<NF;f++){
      const off=dv.getUint32(frameIdxOff+f*8,true),szw=dv.getUint32(frameIdxOff+f*8+4,true);
      const sz=szw&0x7FFFFFFF,key=(f===0)||!!(szw&0x80000000);
      dec.decode(new EncodedVideoChunk({type:key?'key':'delta',timestamp:f*33333,data:u8.subarray(vidOff+off,vidOff+off+sz)}));
    }
    dec.flush().catch(rej);
  });

  // ---- meansLo all frames ----
  hud.textContent='decoding meansLo + SH...';
  const flags=dv.getUint32(mlOff,true);const los=new Array(NF);
  let p=mlOff+4;
  for(let f=0;f<NF;f++){
    const sz=dv.getUint32(p,true);const raw=zstd(u8.subarray(p+4,p+4+sz));p+=4+sz;
    let lo;
    if(flags&0x40000000){const base=raw[0],lut=raw.subarray(1,1+base),pk=raw.subarray(1+base);
      lo=new Uint8Array(nG*3);const b2=base*base;
      for(let j=0;j<nG;j++){const v=pk[j];const ix=(v/b2)|0,rem=v-ix*b2,iy=(rem/base)|0;
        lo[j*3]=lut[ix];lo[j*3+1]=lut[iy];lo[j*3+2]=lut[rem-iy*base];}}
    else if(flags&0x80000000){lo=new Uint8Array(nG*3);
      for(let j=0;j<nG;j++){lo[j*3]=raw[j];lo[j*3+1]=raw[nG+j];lo[j*3+2]=raw[2*nG+j];}}
    else lo=raw;
    los[f]=lo;
  }

  // ---- SH payload (constant labels assumed; XOR deltas applied) ----
  let rest=new Float32Array(nG*45);
  if(shBands>0&&shOff>0){
    const sdv=new DataView(buf,shOff);
    const nC=sdv.getUint16(0,true);const coeffs=45;
    const cb=new Float32Array(buf.slice(shOff+3,shOff+3+256*4));
    let q=shOff+3+256*4;const csz=dv.getUint32(q,true);
    const cbytes=zstd(u8.subarray(q+4,q+4+csz));q+=4+csz;
    // labels frame 0 (first chunk, first frame)
    q+=4; // nFramesInChunk
    const lsz=dv.getUint32(q,true);const lraw=zstd(u8.subarray(q+4,q+4+lsz));
    const labels=new Uint16Array(lraw.buffer,lraw.byteOffset,nG);
    for(let i=0;i<nG;i++){const L=labels[i];
      for(let c=0;c<coeffs;c++)rest[i*45+c]=cb[cbytes[L*coeffs+c]];}
  }
  G={is4dsl:false,nG,NF,R,lumas,los,rest,cache:new Map()};
  seek.max=NF-1;bar.style.display='flex';drop.style.display='none';
  hud.textContent=`ready: ${nG} splats, ${NF} frames`;
  cur=-1;setFrame(0);afterLoad();
}

// ================= .4dsl (deformation-graph format) =================
async function load4dsl(buf){
  const dv=new DataView(buf),u8=new Uint8Array(buf);
  const hdrlen=dv.getUint32(0,true);
  const NF=dv.getUint32(12,true),N=dv.getUint32(16,true),NN=dv.getUint32(20,true),K=dv.getUint32(24,true);
  const q=i=>dv.getFloat32(28+4*i,true), q2=i=>dv.getFloat32(92+4*i,true);
  const PMIN=[q(0),q(1),q(2)],PMAX=[q(3),q(4),q(5)];
  const SMIN=[q(6),q2(0),q2(1)],SMAX=[q(7),q2(2),q2(3)];
  const OMIN=q(8),OMAX=q(9);
  const DMIN=[q(10),q2(4),q2(5)],DMAX=[q(11),q2(6),q2(7)];
  const TMIN=q(12),TMAX=q(13),DOPMIN=q(14),DOPMAX=q(15),DDCMIN=q2(8),DDCMAX=q2(9);
  const nSec=dv.getUint32(132,true);const sec={};
  let p=136;
  for(let s=0;s<nSec;s++){const tag=String.fromCharCode(u8[p],u8[p+1],u8[p+2],u8[p+3]);
    const off=dv.getUint32(p+4,true),sz=dv.getUint32(p+8,true);p+=12;
    sec[tag]=zstd(u8.subarray(hdrlen+off,hdrlen+off+sz));}
  hud.textContent='decoding .4dsl...';
  const u16=b=>new Uint16Array(b.buffer,b.byteOffset,b.byteLength>>1);
  const deqU16=(b,mn,mx,d)=>{const a=u16(b),o=new Float32Array(a.length);
    for(let i=0;i<a.length;i++){const ch=d?i%d:0;const lo=mn[ch]??mn,hi=mx[ch]??mx;o[i]=a[i]/65535*(hi-lo)+lo;}return o;};
  const deqU8=(b,mn,mx,d)=>{const o=new Float32Array(b.length);
    for(let i=0;i<b.length;i++){const ch=d?i%d:0;const lo=mn[ch]??mn,hi=mx[ch]??mx;o[i]=b[i]/255*(hi-lo)+lo;}return o;};
  // canonical (once)
  const P0=deqU16(sec['P0__'],PMIN,PMAX,3);
  const QANC=deqU16(sec['QANC'],-1,1,0);
  const SCLlog=deqU16(sec['SCAL'],SMIN,SMAX,3);
  const SCL=new Float32Array(SCLlog.length);for(let i=0;i<SCL.length;i++)SCL[i]=Math.exp(SCLlog[i]); // world scale
  const OPlogit=deqU16(sec['OPAC'],OMIN,OMAX,0);
  const DC=deqU16(sec['DCOL'],DMIN,DMAX,3);
  const SH=sec['SH16']?deqU16(sec['SH16'],-1,1,0):(sec['SH__']?deqU8(sec['SH__'],-1,1,0):null);   // [N*45]; SH16=16-bit (sharp), SH__=legacy 8-bit, null=DC only
  const G_=deqU16(sec['GPOS'],PMIN,PMAX,3);
  const SKID=u16(sec['SKID']);          // [N*4]
  const SKWT=deqU8(sec['SKWT'],0,1,0);  // [N*4]
  const NODQ=deqU16(sec['NODQ'],-1,1,0);// [NF*NN*4]
  const NODT=deqU16(sec['NODT'],TMIN,TMAX,0);// [NF*NN*3]
  const DOP=deqU8(sec['APPO'],DOPMIN,DOPMAX,0);   // [NF*N]
  const DDC=deqU8(sec['APPD'],DDCMIN,DDCMAX,0);   // [NF*N*3]
  const FTYP=sec['FTYP'];
  // block / raw frame tables + data (kept compressed-decoded as float arrays per frame, lazy)
  function readFrames(hTag,dTag){
    const h=sec[hTag],hv=new DataView(h.buffer,h.byteOffset,h.byteLength);
    const nf=hv.getUint32(0,true);const map={};let doff=0;const D=sec[dTag];
    for(let i=0;i<nf;i++){const fr=hv.getUint32(4+i*8,true),n=hv.getUint32(8+i*8,true);
      map[fr]={n,off:doff};doff+=n*(3+4+3+1+3)*2;} // u16 per value
    return {map,D};
  }
  const BLK=readFrames('BLKH','BLKD'),RAW=readFrames('RAWH','RAWD');
  function frameSplats(pack,fr){ // -> {n,pos,rot,scl(world),opa,col}
    const e=pack.map[fr];if(!e)return null;const n=e.n;const dv2=new DataView(pack.D.buffer,pack.D.byteOffset+e.off);
    const pos=new Float32Array(n*3),rot=new Float32Array(n*4),scl=new Float32Array(n*3),opa=new Float32Array(n),col=new Float32Array(n*3);
    let o=0;const rd=()=>{const v=dv2.getUint16(o,true);o+=2;return v/65535;};
    for(let i=0;i<n*3;i++){const ch=i%3;pos[i]=rd()*(PMAX[ch]-PMIN[ch])+PMIN[ch];}
    for(let i=0;i<n*4;i++)rot[i]=rd()*2-1;
    for(let i=0;i<n*3;i++){const ch=i%3;scl[i]=Math.exp(rd()*(SMAX[ch]-SMIN[ch])+SMIN[ch]);}
    for(let i=0;i<n;i++)opa[i]=1/(1+Math.exp(-(rd()*(OMAX-OMIN)+OMIN)));
    for(let i=0;i<n*3;i++){const ch=i%3;col[i]=rd()*(DMAX[ch]-DMIN[ch])+DMIN[ch];}
    return {n,pos,rot,scl,opa,col};
  }
  G={is4dsl:true,NF,N,NN,K,P0,QANC,SCL,OPlogit,DC,SH,G_,SKID,SKWT,NODQ,NODT,DOP,DDC,FTYP,BLK,RAW,frameSplats,cache:new Map()};
  seek.max=NF-1;bar.style.display='flex';drop.style.display='none';
  hud.textContent=`ready (.4dsl): ${N} splats + graph, ${NF} frames`;
  cur=-1;setFrame(0);afterLoad();
}

function quatRot(qw,qx,qy,qz,vx,vy,vz){ // R(q)·v
  const r0=(1-2*(qy*qy+qz*qz))*vx+2*(qx*qy-qw*qz)*vy+2*(qx*qz+qw*qy)*vz;
  const r1=2*(qx*qy+qw*qz)*vx+(1-2*(qx*qx+qz*qz))*vy+2*(qy*qz-qw*qx)*vz;
  const r2=2*(qx*qz-qw*qy)*vx+2*(qy*qz+qw*qx)*vy+(1-2*(qx*qx+qy*qy))*vz;
  return [r0,r1,r2];
}
function decode4dsl(f){
  if(G.cache.has(f))return G.cache.get(f);
  const ft=G.FTYP[f];
  let d;
  if(ft===2){ // raw window
    const r=G.frameSplats(G.RAW,f+1); // file frames are 1-based
    d={n:r.n,pos:r.pos,scl:r.scl,rot:r.rot,opa:r.opa,col:r.col,rest:null,nShaded:0};
  }else{
    const {N,NN,P0,QANC,SCL,OPlogit,DC,SH,G_,SKID,SKWT}=G;
    const nq=G.NODQ.subarray(f*NN*4,(f+1)*NN*4),nt=G.NODT.subarray(f*NN*3,(f+1)*NN*3);
    const dop=G.DOP.subarray(f*N,(f+1)*N),ddc=G.DDC.subarray(f*N*3,(f+1)*N*3);
    // per-node normalized quats + centers
    const nqn=new Float32Array(NN*4),cen=new Float32Array(NN*3);
    for(let j=0;j<NN;j++){let w=nq[j*4],x=nq[j*4+1],y=nq[j*4+2],z=nq[j*4+3];
      let L=Math.hypot(w,x,y,z)||1;w/=L;x/=L;y/=L;z/=L;nqn[j*4]=w;nqn[j*4+1]=x;nqn[j*4+2]=y;nqn[j*4+3]=z;
      cen[j*3]=G_[j*3]+nt[j*3];cen[j*3+1]=G_[j*3+1]+nt[j*3+1];cen[j*3+2]=G_[j*3+2]+nt[j*3+2];}
    const pos=new Float32Array(N*3),rot=new Float32Array(N*4),opa=new Float32Array(N),col=new Float32Array(N*3);
    for(let i=0;i<N;i++){
      const i4=i*4;let px=0,py=0,pz=0,bw=0,bx=0,by=0,bz=0;
      const n0=SKID[i4];const r0w=nqn[n0*4],r0x=nqn[n0*4+1],r0y=nqn[n0*4+2],r0z=nqn[n0*4+3];
      for(let k=0;k<4;k++){const node=SKID[i4+k],w=SKWT[i4+k];
        const qw=nqn[node*4],qx=nqn[node*4+1],qy=nqn[node*4+2],qz=nqn[node*4+3];
        const relx=P0[i*3]-G_[node*3],rely=P0[i*3+1]-G_[node*3+1],relz=P0[i*3+2]-G_[node*3+2];
        const rr=quatRot(qw,qx,qy,qz,relx,rely,relz);
        px+=w*(rr[0]+cen[node*3]);py+=w*(rr[1]+cen[node*3+1]);pz+=w*(rr[2]+cen[node*3+2]);
        const sgn=(qw*r0w+qx*r0x+qy*r0y+qz*r0z)>=0?w:-w;
        bw+=sgn*qw;bx+=sgn*qx;by+=sgn*qy;bz+=sgn*qz;}
      let bl=Math.hypot(bw,bx,by,bz)||1;bw/=bl;bx/=bl;by/=bl;bz/=bl;
      // rot = quatMul(qb, q_anchor)
      const aw=QANC[i4],ax=QANC[i4+1],ay=QANC[i4+2],az=QANC[i4+3];
      rot[i4]=bw*aw-bx*ax-by*ay-bz*az;
      rot[i4+1]=bw*ax+bx*aw+by*az-bz*ay;
      rot[i4+2]=bw*ay-bx*az+by*aw+bz*ax;
      rot[i4+3]=bw*az+bx*ay-by*ax+bz*aw;
      pos[i*3]=px;pos[i*3+1]=py;pos[i*3+2]=pz;
      opa[i]=1/(1+Math.exp(-(OPlogit[i]+dop[i])));
      col[i*3]=DC[i*3]+ddc[i*3];col[i*3+1]=DC[i*3+1]+ddc[i*3+1];col[i*3+2]=DC[i*3+2]+ddc[i*3+2];
    }
    if(ft===1){ // append block
      const b=G.frameSplats(G.BLK,f+1);const n=N+b.n;
      const P=new Float32Array(n*3),Rt=new Float32Array(n*4),Sc=new Float32Array(n*3),Op=new Float32Array(n),Co=new Float32Array(n*3);
      P.set(pos);Rt.set(rot);Sc.set(SCL);Op.set(opa);Co.set(col);
      P.set(b.pos,N*3);Rt.set(b.rot,N*4);Sc.set(b.scl,N*3);Op.set(b.opa,N);Co.set(b.col,N*3);
      d={n,pos:P,scl:Sc,rot:Rt,opa:Op,col:Co,rest:SH,nShaded:N};
    }else{
      d={n:N,pos,scl:SCL,rot,opa,col,rest:SH,nShaded:N};
    }
  }
  // z180: PLY-native (y-down) -> render space, matching encode_v2 TX=z180
  const P=d.pos,Rt=d.rot;
  for(let i=0;i<d.n;i++){
    P[i*3]=-P[i*3];P[i*3+1]=-P[i*3+1];
    const w=Rt[i*4],x=Rt[i*4+1],y=Rt[i*4+2],z=Rt[i*4+3];
    Rt[i*4]=-z;Rt[i*4+1]=-y;Rt[i*4+2]=x;Rt[i*4+3]=w;}
  evict();
  G.cache.set(f,d);return d;
}

// ---- per-frame attribute decode (exact site math) ----
function decode(f){
  if(G.cache.has(f))return G.cache.get(f);

    setFile((m.label?m.label+' · ':'')+path.split('/').pop());
    await load(buf);
  }catch(err){hud.textContent='Load Current ERROR: '+err;console.error(err);}
}

// ===== render-state exposure for _renderdump.js (cross-viewer comparison) =====
window.__mint={
  file:()=>__file, frame:()=>cur, nG:()=>(G&&(G.nG||G.N))||0,
  config:()=>({fovDeg:FOVDEG, falk:FALK, dilation:DIL, supersample:SS, sortBuckets:NBUCK, minorEigClamp:0.1, falloff:'exp(-A) (true gaussian); A=mahalanobis^2/2'}),
  camera:()=>{const ce=Math.cos(el),se=Math.sin(el);
    const eye=[tgt[0]+dist*ce*Math.sin(az),tgt[1]+dist*se,tgt[2]+dist*ce*Math.cos(az)];
    const fwd=[(tgt[0]-eye[0])/dist,(tgt[1]-eye[1])/dist,(tgt[2]-eye[2])/dist];
    let rx=[fwd[2],0,-fwd[0]];const rl=Math.hypot(...rx)||1;rx=rx.map(v=>v/rl);
    const up=[rx[1]*fwd[2]-rx[2]*fwd[1],rx[2]*fwd[0]-rx[0]*fwd[2],rx[0]*fwd[1]-rx[1]*fwd[0]];
    const view=[rx[0],up[0],fwd[0],0, rx[1],up[1],fwd[1],0, rx[2],up[2],fwd[2],0,
      -(rx[0]*eye[0]+rx[1]*eye[1]+rx[2]*eye[2]),-(up[0]*eye[0]+up[1]*eye[1]+up[2]*eye[2]),-(fwd[0]*eye[0]+fwd[1]*eye[1]+fwd[2]*eye[2]),1];
    const fov=FOVDEG*Math.PI/180, focalPx=cv.height/(2*Math.tan(fov/2));
    return {eye,target:[...tgt],az,el,dist,fovDeg:FOVDEG,focalPx,viewport:[cv.width,cv.height],dpr:SS,view};},
  // current-frame decoded splats {pos,scl(world),rot(wxyz),opa,col,n}
  decode:()=>G&&(G.is4dsl?decode4dsl(cur):decode(cur)),
  // EXACT shader projection in JS -> on-screen footprint (major/minor radius px) for splat i
  project:(d,i,view,focalPx)=>{const P=d.pos,Rt=d.rot,Sc=d.scl;
    const px=P[i*3],py=P[i*3+1],pz=P[i*3+2];
    const tz=view[2]*px+view[6]*py+view[10]*pz+view[14];
    const tx=view[0]*px+view[4]*py+view[8]*pz+view[12], ty=view[1]*px+view[5]*py+view[9]*pz+view[13];
    if(tz<0.2)return null;
    const w=Rt[i*4],x=Rt[i*4+1],y=Rt[i*4+2],z=Rt[i*4+3],s2=[Sc[i*3]**2,Sc[i*3+1]**2,Sc[i*3+2]**2];
    const R=[[1-2*(y*y+z*z),2*(x*y-w*z),2*(x*z+w*y)],[2*(x*y+w*z),1-2*(x*x+z*z),2*(y*z-w*x)],[2*(x*z-w*y),2*(y*z+w*x),1-2*(x*x+y*y)]];
    const cw=(a,b)=>{let v=0;for(let k=0;k<3;k++)v+=R[a][k]*s2[k]*R[b][k];return v;};
    const V3=[[view[0],view[4],view[8]],[view[1],view[5],view[9]],[view[2],view[6],view[10]]];
    const cvv=(a,b)=>{let v=0;for(let m=0;m<3;m++)for(let n=0;n<3;n++)v+=V3[a][m]*cw(m,n)*V3[b][n];return v;};
    const J=[[focalPx/tz,0,-focalPx*tx/(tz*tz)],[0,focalPx/tz,-focalPx*ty/(tz*tz)]];
    const c2=(a,b)=>{let v=0;for(let m=0;m<3;m++)for(let n=0;n<3;n++)v+=J[a][m]*cvv(m,n)*J[b][n];return v;};
    const a=c2(0,0)+DIL,b2=c2(0,1),c=c2(1,1)+DIL;
    const mid=0.5*(a+c),rr=Math.sqrt(Math.max(0,mid*mid-(a*c-b2*b2)));
    return {tz,projPx:[tx*focalPx/tz,ty*focalPx/tz],majorPx:Math.sqrt(2*(mid+rr)),minorPx:Math.sqrt(2*Math.max(mid-rr,0.1)),cov2d:[a,b2,c],opacity:d.opa[i]};}
};

// ===== auto-load TEST_1306 from R2 with a download-progress readout (210 MB) =====
(async()=>{
  const R2='https://pub-74912f96f8a84c0db42d38800266b931.r2.dev/SEQUENCES/TEST_1306_graded.ewa';
  const hud=document.getElementById('hud'), bar=document.getElementById('bar');
  try{
    if(hud) hud.textContent='downloading TEST_1306 (210 MB)…';
    const res=await fetch(R2);
    if(!res.ok) throw new Error('HTTP '+res.status);
    const total=+(res.headers.get('Content-Length')||0);
    const reader=res.body.getReader(); const parts=[]; let got=0;
    for(;;){ const {done,value}=await reader.read(); if(done) break; parts.push(value); got+=value.length;
      if(hud) hud.textContent='downloading TEST_1306… '+(total?Math.round(got/total*100)+'%':((got/1048576)|0)+' MB'); }
    const buf=new Uint8Array(got); let off=0; for(const p of parts){ buf.set(p,off); off+=p.length; }
    if(hud) hud.textContent='decoding…';
    await load(buf.buffer);
    if(hud) hud.textContent='';
    if(bar) bar.style.display='flex';
  }catch(e){ if(hud) hud.textContent='load failed: '+e.message; console.error('EWA load failed',e); }
})();
